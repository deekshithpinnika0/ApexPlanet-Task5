<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5: Capstone Product Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Capstone Store</h1>
    </header>
    <main class="container">
        <h2>Our Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://picsum.photos/200" alt="Product" loading="lazy">
                <h3>Developer Keyboard</h3>
                <p class="price">$99.99</p>
            </div>
            <div class="product-card">
                <img src="https://picsum.photos/201" alt="Product" loading="lazy">
                <h3>Wireless Mouse</h3>
                <p class="price">$49.99</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
